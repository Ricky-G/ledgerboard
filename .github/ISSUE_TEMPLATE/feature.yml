name: Feature request
description: Propose a focused improvement to LedgerBoard
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the behavior, not only a proposed implementation.
    validations:
      required: true
  - type: textarea
    id: markdown
    attributes:
      label: Markdown contract impact
      description: Should this change BOARD.md, KANBAN-CONFIG.md, or KANBAN-HISTORY.md?
