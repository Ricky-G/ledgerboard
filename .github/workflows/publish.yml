name: Publish to Visual Studio Marketplace

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: marketplace-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: marketplace
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run privacy:scan
      - name: Verify release version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "$RELEASE_TAG" = "v$PACKAGE_VERSION" || {
            echo "Release tag $RELEASE_TAG does not match package version $PACKAGE_VERSION."
            exit 1
          }
          echo "Release version verified: $RELEASE_TAG"
      - run: npm run test
      - run: npm run compile
      - run: xvfb-run -a npm run test:integration
      - name: Publish extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npm run publish:marketplace
