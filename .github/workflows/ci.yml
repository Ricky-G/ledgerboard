name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out the pull request
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies from the lockfile
        id: install
        run: npm ci
      - name: Scan for prohibited private data
        id: privacy
        run: npm run privacy:scan
      - name: Type check
        id: type_check
        run: npm run check-types
      - name: Lint
        id: lint
        run: npm run lint
      - name: Run unit tests
        id: unit_tests
        run: npm run test
      - name: Compile the extension
        id: compile
        run: npm run compile
      - name: Run Extension Host integration tests
        id: integration_tests
        run: xvfb-run -a npm run test:integration
      - name: Package VSIX
        id: package
        run: npm run vsix
      - name: Upload VSIX artifact
        id: upload
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: ledgerboard-vsix
          path: '*.vsix'
          if-no-files-found: error
      - name: Publish quality summary
        if: ${{ always() }}
        env:
          INSTALL: ${{ steps.install.outcome }}
          PRIVACY: ${{ steps.privacy.outcome }}
          TYPE_CHECK: ${{ steps.type_check.outcome }}
          LINT: ${{ steps.lint.outcome }}
          UNIT_TESTS: ${{ steps.unit_tests.outcome }}
          COMPILE: ${{ steps.compile.outcome }}
          INTEGRATION_TESTS: ${{ steps.integration_tests.outcome }}
          PACKAGE: ${{ steps.package.outcome }}
          UPLOAD: ${{ steps.upload.outcome }}
        run: |
          {
            echo "## Quality gate"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Lockfile install | $INSTALL |"
            echo "| Privacy scan | $PRIVACY |"
            echo "| Type check | $TYPE_CHECK |"
            echo "| Lint | $LINT |"
            echo "| Unit tests | $UNIT_TESTS |"
            echo "| Compile | $COMPILE |"
            echo "| Integration tests | $INTEGRATION_TESTS |"
            echo "| VSIX package | $PACKAGE |"
            echo "| VSIX upload | $UPLOAD |"
          } >> "$GITHUB_STEP_SUMMARY"
