name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out commit history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Scan for secrets
        id: scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
      - name: Publish secret scan summary
        if: ${{ always() }}
        env:
          SCAN: ${{ steps.scan.outcome }}
        run: |
          {
            echo "## Secret scan"
            echo ""
            echo "Detected secrets fail this gate. Revoke exposed credentials before removing them from source."
            echo ""
            echo "Result: **$SCAN**"
          } >> "$GITHUB_STEP_SUMMARY"
