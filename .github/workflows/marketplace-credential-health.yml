name: Marketplace Credential Health

on:
  schedule:
    - cron: '17 8 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: marketplace
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify publisher access
        id: verify
        continue-on-error: true
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce verify-pat ricky-g
      - name: Check credential dates
        id: dates
        env:
          PAT_VALID_TO: ${{ vars.VSCE_PAT_VALID_TO }}
          GLOBAL_PAT_RETIREMENT: ${{ vars.VSCE_GLOBAL_PAT_RETIREMENT }}
        run: |
          NOW_SECONDS="$(date -u +%s)"
          PAT_SECONDS="$(date -u -d "$PAT_VALID_TO" +%s)"
          RETIREMENT_SECONDS="$(date -u -d "$GLOBAL_PAT_RETIREMENT" +%s)"
          PAT_DAYS="$(( (PAT_SECONDS - NOW_SECONDS) / 86400 ))"
          RETIREMENT_DAYS="$(( (RETIREMENT_SECONDS - NOW_SECONDS) / 86400 ))"
          echo "pat_days=$PAT_DAYS" >> "$GITHUB_OUTPUT"
          echo "retirement_days=$RETIREMENT_DAYS" >> "$GITHUB_OUTPUT"
          if [ "$PAT_DAYS" -le 30 ] || [ "$RETIREMENT_DAYS" -le 45 ]; then
            echo "attention=true" >> "$GITHUB_OUTPUT"
          else
            echo "attention=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Open or update credential issue
        if: always() && (steps.verify.outcome == 'failure' || steps.dates.outputs.attention == 'true')
        uses: actions/github-script@v7
        env:
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          PAT_DAYS: ${{ steps.dates.outputs.pat_days }}
          RETIREMENT_DAYS: ${{ steps.dates.outputs.retirement_days }}
          PAT_VALID_TO: ${{ vars.VSCE_PAT_VALID_TO }}
          GLOBAL_PAT_RETIREMENT: ${{ vars.VSCE_GLOBAL_PAT_RETIREMENT }}
        with:
          script: |
            const title = '[Automation] Marketplace publisher credential needs attention';
            const body = [
              'LedgerBoard Marketplace publishing requires attention.',
              '',
              `- Publisher access verification: **${process.env.VERIFY_OUTCOME}**`,
              `- PAT expiry: **${process.env.PAT_VALID_TO}** (${process.env.PAT_DAYS} days)`,
              `- Global PAT retirement: **${process.env.GLOBAL_PAT_RETIREMENT}** (${process.env.RETIREMENT_DAYS} days)`,
              '',
              'Update the `marketplace/VSCE_PAT` environment secret and its date variables, then run this workflow again.',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find(issue => issue.title === title && !issue.pull_request);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
      - name: Close resolved credential issue
        if: steps.verify.outcome == 'success' && steps.dates.outputs.attention == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Automation] Marketplace publisher credential needs attention';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find(issue => issue.title === title && !issue.pull_request);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Publisher access and credential dates are healthy again. Closing automatically from run ${context.runId}.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }
      - name: Fail when publisher access is invalid
        if: steps.verify.outcome == 'failure'
        run: exit 1
